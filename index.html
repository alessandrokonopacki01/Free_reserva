<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrata Reserva</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="hero">
        <h1>Contrata Reserva</h1>
        <p>
            Encontre o profissional ideal para seu serviço.
        </p>
        <a href="publicar.html">
            <button class="btn">
                Publicar Serviço Gratuitamente
            </button>
        </a>
        <button id="btnLogin" class="btn">
            Faça seu login
        </button>
        <p id="usuarioInfo"></p>
        <a href="creditos.html">
            <button class="btn">
                Comprar Créditos
            </button>
        </a>
    </header>
    
    <section id="secaoDestaques" class="secao-destaques oculto">
        <div class="cabecalho-destaques">
            <div>
                <span class="rotulo-destaque">
                    Profissionais selecionados
                </span>

                <h2>Profissionais em destaque</h2>
            </div>

            <div class="controles-carrossel">
                <button id="carrosselAnterior" type="button" aria-label="Profissional anterior">
                    &#10094;
                </button>

                <button id="carrosselProximo" type="button" aria-label="Próximo profissional">
                    &#10095;
                </button>
            </div>
        </div>

        <div class="carrossel-janela">
            <div id="carrosselDestaques" class="carrossel-destaques"></div>
        </div>

        <div id="indicadoresCarrossel" class="indicadores-carrossel"></div>
    </section>
    <section class="lista">
        <h2>Serviços Publicados</h2>
        <div id="anuncios"></div>
    </section>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Contato do Cliente</h2>
            <p id="nomeCliente"></p>
            <p id="telefoneCliente"></p>
            <a id="btnWhatsapp" target="_blank">
                <button class="btn-whatsapp">
                    Abrir WhatsApp
                </button>
            </a>
            <br><br>
            <button onclick="fecharModal()">
                Fechar
            </button>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
