<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Publicar Serviço</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Publicar Serviço</h1>

        <input id="nome" placeholder="Seu nome">

        <input id="telefone" placeholder="WhatsApp">

        <select id="categoria">

            <option>Construção</option>
            <option>Elétrica</option>
            <option>Informática</option>
            <option>Aulas Particulares</option>
            <option>Limpeza</option>
            <option>Jardinagem</option>
            <option>Outros</option>

        </select>

        <input id="titulo" placeholder="Título do serviço">

        <textarea id="descricao" placeholder="Descreva o que você precisa">
</textarea>

        <button id="btnPublicar">
            Publicar Serviço
        </button>

        <a href="index.html">
            Voltar
        </a>

    </div>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <div id="storyAnuncio" class="story-modelo">
        <div class="story-topo">
            CONTRATA
            <span>RESERVA</span>
        </div>

        <div class="story-categoria" id="storyCategoria">
            SERVIÇO
        </div>

        <div class="story-descricao" id="storyDescricao">
            Descrição do anúncio
        </div>

        <div class="story-chamada">
            VENHA CONFERIR!
            <small>CLIQUE NO LINK DA BIO</small>
        </div>
    </div>
    <script type="module" src="publicar.js">
    </script>

</body>

</html>
